<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dream OS</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
      textarea, input, button { -webkit-appearance: none; appearance: none; }
      textarea { background: transparent !important; }
      ::-webkit-input-placeholder { color: rgba(255,255,255,0.35); }
      ::-moz-placeholder { color: rgba(255,255,255,0.35); }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #000000;
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
        height: 100vh;
      }

      #dream-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: #000000;
      }

      /* Animations migrated to src/global.css */
    </style>
  </head>
  <body>
    <div id="dream-bg"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
