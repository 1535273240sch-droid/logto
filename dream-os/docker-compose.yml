version: "3.8"

services:
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend-new:/usr/share/nginx/html:ro
      - ./dream-os-next/dist:/dream-os-next-dist:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - dream-os-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./core:/dream-os/core:ro
      - ./services:/dream-os/services:ro
    environment:
      - PYTHONPATH=/app:/dream-os
    networks:
      - dream-os-net
      - dream-os_default

networks:
  dream-os-net:
    driver: bridge
  dream-os_default:
    external: true
