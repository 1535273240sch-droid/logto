  display: flex; align-items: center; gap: 0.5rem;
}
.dev-task-card .dtc-stage {
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent2);
  font-size: 0.72rem;
}
.dev-task-card .dtc-stage.running { color: var(--accent); }

/* 进度条 */

<script>
(function() {
  'use strict';

  // ── Step Definitions ──
  const STEPS = [
    { id: 'context_builder',  label: '正在理解问题...',     emoji: '🧠' },
    { id: 'memory',           label: '正在读取长期记忆...',  emoji: '📚' },
    { id: 'context',          label: '正在恢复历史上下文...', emoji: '💬' },
    { id: 'intent_detector',  label: '正在识别意图...',     emoji: '🎯' },
    { id: 'planner',          label: '正在制定计划...',     emoji: '📋' },
    { id: 'router',           label: '正在路由工具...',     emoji: '🔗' },
    { id: 'executor',         label: '正在调用工具...',     emoji: '🔍' },
    { id: 'observation',      label: '正在分析结果...',     emoji: '📊' },
    { id: 'llm_final',        label: '正在生成回答...',     emoji: '✍️' },
  ];

  // ── DOM refs ──
  const chatInput = document.getElementById('chatInput');
  const sendBtn = document.getElementById('sendBtn');
  const statusPanel = document.getElementById('statusPanel');
  const stepsList = document.getElementById('stepsList');
  const toolCards = document.getElementById('toolCards');
  const summaryBar = document.getElementById('summaryBar');
  const responseArea = document.getElementById('responseArea');
  const responseContent = document.getElementById('responseContent');
  const responseMeta = document.getElementById('responseMeta');
  const statusTitle = document.getElementById('statusTitle');
  const statusDot = document.getElementById('statusDot');
  const toggleBtn = document.getElementById('toggleBtn');

  // ── State ──
  let eventSource = null;
  let isRunning = false;
  let stepStates = {};
  let toolCount = 0;
  let totalDuration = 0;
  let responseContentText = '';
  let intentLabel = '';

  // ── Build step DOM ──
  function buildSteps() {
    stepsList.innerHTML = '';
    STEPS.forEach((s, idx) => {
      const el = document.createElement('div');
      el.className = 'step-item';
      el.id = 'step-' + s.id;
      el.innerHTML = `
        <div class="step-icon" id="icon-${s.id}">
          <span class="emoji">${s.emoji}</span>
        </div>
        <div class="step-label" id="label-${s.id}">${s.label}</div>
        <div class="step-duration" id="time-${s.id}"></div>
      `;
      stepsList.appendChild(el);
      stepStates[s.id] = 'waiting';
    });
  }

  // ── Update step state ──
  function setStepState(stepId, state, durationMs) {
    const icon = document.getElementById('icon-' + stepId);
    const label = document.getElementById('label-' + stepId);
    const time = document.getElementById('time-' + stepId);
    const item = document.getElementById('step-' + stepId);
    if (!icon) return;

    // Reset classes
    icon.className = 'step-icon';
    label.className = 'step-label';
    time.className = 'step-duration';

    stepStates[stepId] = state;

    if (state === 'running') {
      icon.classList.add('running');
      label.classList.add('active');
      item.classList.add('visible');
      // Scroll to this step
      item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    } else if (state === 'success') {
      icon.classList.add('success');
      label.classList.add('done');
      time.classList.add('visible');
      if (durationMs != null) {
        time.textContent = durationMs < 1000 ? durationMs + 'ms' : (durationMs / 1000).toFixed(1) + 's';
        totalDuration += durationMs;
      }
    } else if (state === 'failed') {
      icon.classList.add('failed');
      label.classList.add('active');
      time.classList.add('visible');
      if (durationMs != null) {
        time.textContent = durationMs < 1000 ? durationMs + 'ms' : (durationMs / 1000).toFixed(1) + 's';
      }
    } else if (state === 'skipped') {
      icon.classList.add('skipped');
      label.classList.add('done');
    }

    // Make preceding steps visible
    let found = false;
    STEPS.forEach(s => {
      const el = document.getElementById('step-' + s.id);
      if (el) {
        if (s.id === stepId) found = true;
        if (found || stepStates[s.id] !== 'waiting') {
          el.classList.add('visible');
        }
      }
    });
  }

  // ── Add tool card ──
  function addToolCard(tool, status, durationMs, resultPreview, isFallback) {
    toolCount++;
    const card = document.createElement('div');
    card.className = 'tool-card';
    const statusStr = status === 'running' ? 'running'
      : status === 'success' ? 'success'
      : status === 'timeout' ? 'timeout'
      : 'failed';
    const label = status === 'running' ? '执行中...'
      : status === 'success' ? '成功'
      : status === 'timeout' ? '超时'
      : '失败';
    const timeStr = durationMs != null
      ? (durationMs < 1000 ? durationMs + 'ms' : (durationMs / 1000).toFixed(1) + 's')
      : '';
    card.innerHTML = `
      <span class="tool-name">${tool}</span>
      <span class="tool-status">
        <span class="tool-dot ${statusStr}"></span>
        <span class="tool-label">${label}</span>
        ${isFallback ? '<span class="tool-fallback">备用</span>' : ''}
      </span>
      <span class="tool-time">${timeStr}</span>
    `;
    toolCards.appendChild(card);
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ── Update summary ──
  function updateSummary() {
    const successCount = Object.values(stepStates).filter(s => s === 'success').length;
    const totalSteps = STEPS.length;
    const totalTime = totalDuration < 1000
      ? totalDuration + 'ms'
      : (totalDuration / 1000).toFixed(1) + 's';
    summaryBar.innerHTML = `
      <span>步骤 <span class="num">${successCount}/${totalSteps}</span></span>
      <span>工具 <span class="num">${toolCount}</span></span>
      <span>耗时 <span class="num">${totalTime}</span></span>
      ${intentLabel ? `<span>意图 <span class="num">${intentLabel}</span></span>` : ''}
    `;
  }

  // ── Reset UI ──
  function resetUI() {
    if (eventSource) {
      eventSource.close();
      eventSource = null;
    }
    isRunning = false;
    toolCount = 0;
    totalDuration = 0;
    intentLabel = '';
    responseContentText = '';
    responseContent.innerHTML = '';
    responseArea.classList.remove('visible');
    toolCards.innerHTML = '';
    summaryBar.innerHTML = '';
    sendBtn.textContent = '发送';
    sendBtn.disabled = false;
    sendBtn.classList.remove('sending');
    statusDot.className = 'pulse';
    statusTitle.textContent = 'AI 正在处理...';
    stepStates = {};
    buildSteps();
  }

  // ── Show response text streaming ──
  function appendResponse(token) {
    responseContentText += token;
    responseContent.innerHTML = escapeHtml(responseContentText) + '<span class="cursor"></span>';
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // ── Connect SSE ──
  function startStream(message) {
    resetUI();
    statusPanel.classList.remove('hidden');
    statusPanel.classList.remove('collapsed');
    isRunning = true;
    sendBtn.textContent = '处理中...';
    sendBtn.disabled = true;
    sendBtn.classList.add('sending');
    statusDot.className = 'pulse';

    fetch('/api/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: message, history: [] }),
    }).then(response => {
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      function processChunk() {
        reader.read().then(({ done, value }) => {
          if (done) return;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = line.slice(6).trim();
            if (data === '[DONE]') continue;
            try {
              const event = JSON.parse(data);
              handleEvent(event);
            } catch (e) {
              // skip malformed
            }
          }
          processChunk();
        }).catch(err => {
          console.error('Stream read error:', err);
          finishStream();
        });
      }

      processChunk();
    }).catch(err => {
      console.error('Fetch error:', err);
      statusTitle.textContent = '连接失败，请检查服务器';
      statusDot.className = 'pulse error';
      sendBtn.textContent = '发送';
      sendBtn.disabled = false;
      sendBtn.classList.remove('sending');
      isRunning = false;
    });
  }

  // ── Event Handler ──
  function handleEvent(event) {
    // 先识别 V3 自主开发事件 (统一入口)
    const V3_EVENTS = ['dev_start', 'dev_complete', 'agent_start', 'agent_complete',
                      'agent_handoff', 'loop_iteration', 'progress_update'];
    if (V3_EVENTS.includes(event.type)) {
      handleV3Event(event);
      return;
    }
    switch (event.type) {
      case 'pipeline_start':
        statusTitle.textContent = 'AI 工作流程已启动';
        break;

      case 'step_start':
        setStepState(event.step, 'running');
        statusTitle.textContent = event.label || event.step;
        // Make sure the tool cards area is visible
        if (event.step === 'executor') {
          toolCards.style.display = 'block';
        }
        break;

      case 'step_complete':
        setStepState(event.step, event.status || 'success', event.duration_ms);
        if (event.error) {
          console.warn('Step error:', event.step, event.error);
        }
        break;

      case 'tool_start':
        addToolCard(event.tool, 'running', null, null, event.is_fallback);
        statusTitle.textContent = `正在调用 ${event.tool}`;
        break;

      case 'tool_result':
        addToolCard(event.tool, event.status, event.duration_ms,
          event.result_preview, event.is_fallback);
        break;

      case 'content':
        if (!responseArea.classList.contains('visible')) {
          responseArea.classList.add('visible');
        }
        appendResponse(event.content);
        break;

      case 'intent':
        intentLabel = event.intent;
        break;

      case 'done':
        finishStream(event);
        break;

      case 'error':
        statusTitle.textContent = '出现错误: ' + (event.content || '');
        statusDot.className = 'pulse error';
        finishStream();
        break;
    }
  }

  // ── Finish Stream ──
  function finishStream(event) {
    if (event) {
      intentLabel = event.intent || intentLabel;
      toolCount = event.tool_count || toolCount;
      statusTitle.textContent = '已完成';
      statusDot.className = 'pulse done';
    } else {
      statusTitle.textContent = '处理完成';
      statusDot.className = 'pulse done';
    }
    updateSummary();
    sendBtn.textContent = '发送';
    sendBtn.disabled = false;
    sendBtn.classList.remove('sending');
    isRunning = false;

    // Remove cursor blink after a moment
    setTimeout(() => {
      const cursor = responseContent.querySelector('.cursor');
      if (cursor) cursor.remove();
    }, 1500);
  }


  // ── Model Settings ──
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsOverlay = document.getElementById('settingsOverlay');

  if (settingsBtn && settingsOverlay) {
    settingsBtn.addEventListener('click', () => {
      settingsOverlay.classList.add('show');
      loadModelSettings();
    });
    settingsOverlay.addEventListener('click', (e) => {
      if (e.target === settingsOverlay) settingsOverlay.classList.remove('show');
    });
  }

  window.closeSettings = function() {
    document.getElementById('settingsOverlay').classList.remove('show');
  };

  async function loadModelSettings() {
    try {
      const r = await fetch('/api/settings/model');
      const d = await r.json();
      const s = d.settings || {};
      document.getElementById('settingProvider').value = s.provider || 'custom';
      document.getElementById('settingBaseUrl').value = s.base_url || '';
      document.getElementById('settingApiKey').value = s.api_key || '';
      document.getElementById('settingModel').value = s.model || '';
    } catch(e) { console.warn('Load settings failed:', e); }
  }

  window.saveModelSettings = async function() {
    const data = {
      provider: document.getElementById('settingProvider').value,
      base_url: document.getElementById('settingBaseUrl').value,
      api_key: document.getElementById('settingApiKey').value,
      model: document.getElementById('settingModel').value,
    };
    const statusEl = document.getElementById('settingsStatus');
    try {
      const r = await fetch('/api/settings/model', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const d = await r.json();
      if (r.ok) {
        statusEl.textContent = '✓ 已保存，即时生效';
        statusEl.className = 'status-msg ok';
        setTimeout(() => { closeSettings(); statusEl.textContent = ''; }, 1500);
      } else {
        statusEl.textContent = '✗ 保存失败';
        statusEl.className = 'status-msg err';
      }
    } catch(e) {
      statusEl.textContent = '✗ ' + e.message;
      statusEl.className = 'status-msg err';
    }
  };

  window.testModelConnection = async function() {
    const data = {
      provider: document.getElementById('settingProvider').value,
      base_url: document.getElementById('settingBaseUrl').value,
      api_key: document.getElementById('settingApiKey').value,
      model: document.getElementById('settingModel').value,
    };
    const statusEl = document.getElementById('settingsStatus');
    statusEl.textContent = '测试中...';
    statusEl.className = 'status-msg';
    try {
      const r = await fetch('/api/settings/model/test', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      const d = await r.json();
      if (d.ok) {
        statusEl.textContent = '✓ 连接成功: ' + (d.reply || '').slice(0, 30);
        statusEl.className = 'status-msg ok';
      } else {
        statusEl.textContent = '✗ ' + (d.error || '连接失败').slice(0, 60);
        statusEl.className = 'status-msg err';
      }
    } catch(e) {
      statusEl.textContent = '✗ ' + e.message;
      statusEl.className = 'status-msg err';
    }
  };

  document.getElementById('settingProvider').addEventListener('change', function() {
    const presets = {
      zhipu: { base_url: 'https://open.bigmodel.cn/api/paas/v4', model: 'glm-4-flash' },
      openai: { base_url: 'https://api.openai.com/v1', model: 'gpt-4o-mini' },
      deepseek: { base_url: 'https://api.deepseek.com/v1', model: 'deepseek-chat' },
    };
    const p = presets[this.value];
    if (p) {
      document.getElementById('settingBaseUrl').value = p.base_url;
      document.getElementById('settingModel').value = p.model;
    }
  });

  // ── Send message ──
  function sendMessage() {
    const msg = chatInput.value.trim();
    if (!msg || isRunning) return;
    chatInput.value = '';
    startStream(msg);
  }

  // ── Event listeners ──
  sendBtn.addEventListener('click', sendMessage);
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  // Presets
  document.querySelectorAll('#presets button').forEach(btn => {
    btn.addEventListener('click', () => {
      chatInput.value = btn.dataset.msg;
      sendMessage();
    });
  });

  // Toggle collapse
  toggleBtn.addEventListener('click', () => {
    statusPanel.classList.toggle('collapsed');
    toggleBtn.textContent = statusPanel.classList.contains('collapsed') ? '展开' : '收起';
  });

  // ════════════════════════════════════════════════
  // V3 自主开发 — 任务卡片 + 任务中心
  // ════════════════════════════════════════════════

  const devTaskContainer = document.getElementById('devTaskContainer');
  const taskCenterBtn = document.getElementById('taskCenterBtn');
  const taskCenterOverlay = document.getElementById('taskCenterOverlay');
  const taskCenterBody = document.getElementById('taskCenterBody');
  const taskBadge = document.getElementById('taskBadge');

  // 当前活跃任务（用于实时更新卡片）
  const activeDevTasks = new Map(); // task_id -> { card, data }

  // 阶段中文映射
  const STAGE_LABELS = {
    planning: '正在规划', architecting: '正在设计架构',
    coding: '正在编写代码', executing: '正在执行', reviewing: '正在代码审查',
    testing: '正在自动测试', deploying: '正在部署', reporting: '正在生成报告',
    pending: '等待启动', completed: '已完成', failed: '执行失败',
  };
  const STAGE_EMOJI = {
    planning: '🧠', architecting: '🏗', coding: '💻', executing: '⚡',
    reviewing: '🔍', testing: '🧪', deploying: '🚀', reporting: '📝',
    completed: '✅', failed: '❌', pending: '⏳',
  };
  const STAGE_PROGRESS = {
    planning: 12, architecting: 25, coding: 50, executing: 60,
    reviewing: 70, testing: 80, deploying: 90, reporting: 95,
    completed: 100, failed: 100, pending: 5,
  };

  // ── 创建/获取任务卡片 ──
  function getOrCreateDevTaskCard(taskId, requirement) {
    if (activeDevTasks.has(taskId)) {
      return activeDevTasks.get(taskId).card;
    }
    const card = document.createElement('div');
    card.className = 'dev-task-card';
    card.id = 'devtask-' + taskId;
    card.innerHTML = `
      <div class="dtc-header">
        <div class="dtc-icon running" id="dtc-icon-${taskId}">🚀</div>
        <div class="dtc-meta">
          <div class="dtc-title" id="dtc-title-${taskId}">${escapeHtml(requirement || '自主开发任务')}</div>
          <div class="dtc-subtitle">
            <span class="dtc-stage running" id="dtc-stage-${taskId}">正在启动...</span>
            <span id="dtc-iter-${taskId}"></span>
          </div>
        </div>
        <button class="dtc-toggle" id="dtc-toggle-${taskId}">详情</button>
      </div>
      <div class="dtc-progress">
        <div class="dtc-progress-bar" id="dtc-bar-${taskId}" style="width: 5%"></div>
      </div>
      <div class="dtc-body" id="dtc-body-${taskId}"></div>
    `;
    devTaskContainer.appendChild(card);
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    // 详情切换
    const toggle = card.querySelector('.dtc-toggle');
    toggle.addEventListener('click', () => {
      card.classList.toggle('expanded');
      toggle.textContent = card.classList.contains('expanded') ? '收起' : '详情';
    });

    activeDevTasks.set(taskId, { card, data: { requirement } });
    return card;
  }

  // ── 更新任务卡片 ──
  function updateDevTaskCard(taskId, data) {
    const card = getOrCreateDevTaskCard(taskId, data.requirement);
    const stage = data.stage || data.status || 'pending';
    const stageLabel = STAGE_LABELS[stage] || stage;
    const emoji = STAGE_EMOJI[stage] || '⚡';
    const progress = STAGE_PROGRESS[stage] || 0;

    // 更新阶段
    const stageEl = document.getElementById('dtc-stage-' + taskId);
    if (stageEl) {
      stageEl.textContent = stageLabel;
      stageEl.className = 'dtc-stage ' + (stage === 'completed' ? '' : stage === 'failed' ? 'failed' : 'running');
    }
    const iconEl = document.getElementById('dtc-icon-' + taskId);
    if (iconEl) iconEl.textContent = emoji;

    // 更新进度条
    const bar = document.getElementById('dtc-bar-' + taskId);
    if (bar) bar.style.width = progress + '%';

    // 更新迭代
    if (data.iteration) {
      const iterEl = document.getElementById('dtc-iter-' + taskId);
      if (iterEl) iterEl.textContent = `· 第 ${data.iteration}/${data.max_iterations || 3} 轮`;
    }

    // 完成态
    if (stage === 'completed') {
      card.classList.add('completed');
      card.querySelector('.dtc-icon').classList.remove('running');
      const toggle = card.querySelector('.dtc-toggle');
      if (toggle) toggle.textContent = '查看成果';
      card.classList.add('expanded');
      // 渲染成果物
      renderDeliverables(taskId, data);
    } else if (stage === 'failed') {
      card.classList.add('failed');
      card.querySelector('.dtc-icon').classList.remove('running');
    } else {
      card.querySelector('.dtc-icon').classList.add('running');
    }

    // 详情内容
    renderDevTaskBody(taskId, data);
  }

  // ── 渲染任务详情 ──
  function renderDevTaskBody(taskId, data) {
    const body = document.getElementById('dtc-body-' + taskId);
    if (!body) return;
    let html = '';
    if (data.plan && data.plan.task_summary) {
      html += `<div class="dtc-row"><div class="dtc-label">任务</div><div class="dtc-value">${escapeHtml(data.plan.task_summary)}</div></div>`;
    }
    if (data.plan && data.plan.tech_stack) {
      const stack = typeof data.plan.tech_stack === 'object'
        ? Object.values(data.plan.tech_stack).join(' · ')
        : String(data.plan.tech_stack);
      html += `<div class="dtc-row"><div class="dtc-label">技术栈</div><div class="dtc-value mono">${escapeHtml(stack)}</div></div>`;
    }
    if (data.architecture && data.architecture.directory_structure) {
      const dirs = typeof data.architecture.directory_structure === 'object'
        ? Object.keys(data.architecture.directory_structure).join(' · ')
        : '';
      if (dirs) html += `<div class="dtc-row"><div class="dtc-label">模块</div><div class="dtc-value mono">${escapeHtml(dirs)}</div></div>`;
    }
    if (data.files && data.files.length) {
      html += `<div class="dtc-row"><div class="dtc-label">文件</div><div class="dtc-value mono">${data.files.length} 个文件</div></div>`;
    }
    if (data.test_results && data.test_results.total != null) {
      const tr = data.test_results;
      html += `<div class="dtc-row"><div class="dtc-label">测试</div><div class="dtc-value">${tr.passed_count || 0}/${tr.total} 通过 ${tr.failed_count ? '· <span style="color:var(--accent3)">' + tr.failed_count + ' 失败</span>' : ''}</div></div>`;
    }
    if (data.error) {
      html += `<div class="dtc-row"><div class="dtc-label">错误</div><div class="dtc-value" style="color:var(--accent3)">${escapeHtml(String(data.error).slice(0, 200))}</div></div>`;
    }
    body.innerHTML = html;
  }

  // ── 渲染成果物 (完成态) ──
  function renderDeliverables(taskId, data) {
    const body = document.getElementById('dtc-body-' + taskId);
    if (!body) return;
    let chips = '<div class="dtc-deliverables">';
    // 部署地址
    if (data.deployment && data.deployment.url) {
      chips += `<a class="deliverable-chip url" href="${escapeHtml(data.deployment.url)}" target="_blank">🌐 ${escapeHtml(data.deployment.url)}</a>`;
    }
    // 源码
    if (data.files && data.files.length) {
      chips += `<span class="deliverable-chip" onclick="viewTaskFiles('${taskId}')">📦 源码 ${data.files.length} 文件</span>`;
    }
    // 文档
    if (data.reports && data.reports.length) {
      chips += `<span class="deliverable-chip" onclick="viewTaskFiles('${taskId}')">📄 文档 ${data.reports.length} 份</span>`;
    }
    chips += '</div>';
    body.insertAdjacentHTML('beforeend', chips);
  }

  // ── V3 SSE 事件处理 ──
  function handleV3Event(event) {
    switch (event.type) {
      case 'dev_start': {
        // 自主开发启动
        const taskId = event.task_id;
        // 隐藏普通 status panel，让 dev card 接管
        statusPanel.classList.add('hidden');
        responseArea.classList.remove('visible');
        getOrCreateDevTaskCard(taskId, event.requirement);
        updateDevTaskCard(taskId, { stage: 'planning', requirement: event.requirement });
        refreshTaskBadge();
        break;
      }
      case 'agent_start': {
        const taskId = event.task_id;
        const stage = event.stage || event.agent;
        updateDevTaskCard(taskId, { stage });
        break;
      }
      case 'progress_update': {
        if (event.task_id && event.stage) {
          updateDevTaskCard(event.task_id, { stage: event.stage, iteration: event.iteration, max_iterations: event.max_iterations });
        }
        break;
      }
      case 'agent_handoff': {
        if (event.task_id && event.to_stage) {
          updateDevTaskCard(event.task_id, { stage: event.to_stage });
        }
        break;
      }
      case 'agent_complete': {
        if (event.task_id && event.data) {
          updateDevTaskCard(event.task_id, {
            stage: event.stage,
            plan: event.data.plan,
            architecture: event.data.architecture,
            files: event.data.files ? Object.keys(event.data.files) : undefined,
            test_results: event.data.test_results,
            deployment: event.data.deployment,
            reports: event.data.reports,
            iteration: event.iteration,
            max_iterations: event.max_iterations,
          });
        }
        break;
      }
      case 'loop_iteration': {
        if (event.task_id) {
          updateDevTaskCard(event.task_id, {
            iteration: event.iteration,
            max_iterations: event.max_iterations,
            stage: 'coding',
          });
        }
        break;
      }
      case 'dev_complete': {
        const taskId = event.task_id;
        updateDevTaskCard(taskId, {
          stage: event.success ? 'completed' : 'failed',
          error: event.error,
          deployment: event.deployment,
          files: event.files,
          reports: event.reports,
        });
        refreshTaskBadge();
        // 重新启用输入
        sendBtn.textContent = '发送';
        sendBtn.disabled = false;
        sendBtn.classList.remove('sending');
        isRunning = false;
        break;
      }
      case 'content': {
        // V3 模式下的文字内容（如总结）也展示
        if (!responseArea.classList.contains('visible')) {
          responseArea.classList.add('visible');
        }
        appendResponse(event.content);
        break;
      }
      case 'error': {
        if (event.task_id) {
          updateDevTaskCard(event.task_id, { stage: 'failed', error: event.error || event.content });
        }
        break;
      }
    }
  }

  // ── 任务中心：打开/关闭 ──
  window.closeTaskCenter = function() {
    taskCenterOverlay.classList.remove('show');
  };
  if (taskCenterBtn) {
    taskCenterBtn.addEventListener('click', () => {
      taskCenterOverlay.classList.add('show');
      loadTaskCenterList();
    });
    taskCenterOverlay.addEventListener('click', (e) => {
      if (e.target === taskCenterOverlay) taskCenterOverlay.classList.remove('show');
    });
  }

  // ── 加载任务列表 ──
  async function loadTaskCenterList() {
    try {
      const r = await fetch('/api/v3/dev/tasks?limit=20');
      const d = await r.json();
      const tasks = d.tasks || [];
      if (!tasks.length) {
        taskCenterBody.innerHTML = '<div class="tc-empty">暂无任务</div>';
        return;
      }
      taskCenterBody.innerHTML = tasks.map(t => {
        const stage = STAGE_LABELS[t.current_agent] || t.status || 'pending';
        const dotClass = t.status === 'completed' ? 'completed' : t.status === 'failed' ? 'failed' : t.status === 'planning' || t.status === 'running' ? 'running' : 'pending';
        return `
          <div class="tc-task" onclick="viewTaskDetail('${t.id}')">
            <div class="tc-row1">
              <span class="tc-status-dot ${dotClass}"></span>
              <span class="tc-req">${escapeHtml(t.requirement || '(无标题)')}</span>
              <span class="tc-time">${(t.created_at || '').slice(5, 16)}</span>
            </div>
            <div class="tc-row2">
              <span class="tc-stage">${stage}</span>
              ${t.iteration ? `<span>第 ${t.iteration}/${t.max_iterations} 轮</span>` : ''}
              ${t.files_count ? `<span>📦 ${t.files_count} 文件</span>` : ''}
              ${t.summary ? `<span>${escapeHtml(t.summary.slice(0, 40))}</span>` : ''}
            </div>
          </div>
        `;
      }).join('');
    } catch (e) {
      taskCenterBody.innerHTML = '<div class="tc-empty">加载失败</div>';
    }
  }

  window.viewTaskDetail = function(taskId) {
    taskCenterOverlay.classList.remove('show');
    window.open('/v3-dev.html?task=' + taskId, '_blank');
  };
  window.viewTaskFiles = function(taskId) {
    window.open('/v3-dev.html?task=' + taskId, '_blank');
  };

  // ── 刷新任务徽章 ──
  async function refreshTaskBadge() {
    try {
      const r = await fetch('/api/v3/dev/tasks?status=running&limit=10');
      const d = await r.json();
      const running = (d.tasks || []).filter(t => t.status !== 'completed' && t.status !== 'failed').length;
      if (running > 0) {
        taskBadge.textContent = running;
        taskBadge.style.display = 'flex';
      } else {
        taskBadge.style.display = 'none';
      }
    } catch (e) {}
  }

  // 启动时刷新一次徽章
  refreshTaskBadge();
  setInterval(refreshTaskBadge, 15000); // 每 15s 刷新一次

  // ── Init ──
  buildSteps();
  toolCards.style.display = 'none';

})();
</script>
<script src="artifact-ui.js?v=2"></script>
</body>
</html>
