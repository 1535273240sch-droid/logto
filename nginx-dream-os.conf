# Dream OS Nginx 配置
# 作用:
#   1. 静态前端页面 (/, /v3-dev.html, /status-widget.html 等)
#   2. 反向代理 /api/* 到后端 8000 端口
#   3. WebSocket 代理 /ws 到后端
#   4. SSE 长连接优化 (关闭 buffer，支持流式推送)

upstream dream_os_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # ── 静态前端 ──
    root /dream-os/frontend;
    index status-widget.html;

    # 上传大小限制
    client_max_body_size 50M;

    # ── 主页 (默认聊天页) ──
    location = / {
        try_files /status-widget.html =404;
    }

    # ── 各前端页面 ──
    location ~ ^/(status-widget|project-workspace|v3-dev|tool-center)\.html$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # ── API 反向代理 ──
    location /api/ {
        proxy_pass http://dream_os_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 关键: 关闭缓冲，支持流式推送
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # 支持 HTTP/1.1 长连接
        proxy_set_header Connection "";
    }

    # ── WebSocket 代理 ──
    location /ws {
        proxy_pass http://dream_os_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # ── 健康检查 ──
    location = /health {
        proxy_pass http://dream_os_backend/api/health;
        access_log off;
    }

    # ── 静态资源 ──
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── 错误页 ──
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        default_type text/html;
        return 502 '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Dream OS 离线</title><style>body{font-family:sans-serif;background:#0d1117;color:#e6edf3;text-align:center;padding:50px;}h1{color:#fd79a8;}</style></head><body><h1>😴 Dream OS 后端不可达</h1><p>请稍后再试，或检查后端容器状态</p></body></html>';
    }
}
